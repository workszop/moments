<!-- Open this in a browser to generate icons, or use any 512x512 purple square with "m" -->
<canvas id="c" width="512" height="512"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
x.fillStyle='#C77DFF';x.beginPath();x.roundRect(0,0,512,512,80);x.fill();
x.fillStyle='#1a1a2e';x.beginPath();x.roundRect(8,8,496,496,72);x.fill();
x.fillStyle='#C77DFF';x.beginPath();x.roundRect(16,16,480,480,64);x.fill();
x.fillStyle='#fff';x.font='900 280px Nunito,sans-serif';x.textAlign='center';x.textBaseline='middle';
x.fillText('m',256,270);
</script>
